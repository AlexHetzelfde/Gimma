<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wiki Leerapp</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0f0f0f;
      --bg2:       #1a1a1a;
      --bg3:       #242424;
      --border:    #2e2e2e;
      --text:      #e8e3db;
      --muted:     #7a7570;
      --accent:    #c8a96e;
      --accent2:   #8fb5a0;
      --error:     #c46a5a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Lora', serif;
      font-size: 1.4rem;
      color: var(--accent);
      letter-spacing: 0.02em;
    }

    .logo span {
      color: var(--muted);
      font-weight: 400;
      font-size: 0.9rem;
      margin-left: 0.75rem;
    }

    .datum {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #homescreen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      gap: 2rem;
    }

    .hero-tekst { text-align: center; }

    .hero-tekst h1 {
      font-family: 'Lora', serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 600;
      line-height: 1.2;
      margin-bottom: 0.75rem;
    }

    .hero-tekst p {
      color: var(--muted);
      font-size: 1rem;
      max-width: 420px;
    }

    .knop-primair {
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      padding: 1rem 2.5rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.01em;
    }

    .knop-primair:hover { opacity: 0.85; transform: translateY(-1px); }
    .knop-primair:active { transform: translateY(0); }
    .knop-primair:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    #status-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 500px;
    }

    #status-wrap.zichtbaar { display: flex; }

    .laadbalk-bg {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .laadbalk-voortgang {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width 0.4s ease;
    }

    #status-tekst {
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
    }

    /* ── Debug JSON weergave (stap 2) ── */
    #debug-wrap {
      display: none;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      width: 100%;
    }

    #debug-wrap.zichtbaar { display: block; }

    .debug-label {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .debug-titel {
      font-family: 'Lora', serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 600;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    /* Sectie preview cards */
    .sectie-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    .sectie-card h3 {
      font-family: 'Lora', serif;
      font-size: 1.1rem;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }

    .sectie-card p {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .vraag-item {
      background: var(--bg3);
      border-radius: 4px;
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
    }

    .vraag-item .type-badge {
      display: inline-block;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      margin-bottom: 0.4rem;
    }

    .type-badge.meerkeuze {
      background: rgba(200, 169, 110, 0.15);
      color: var(--accent);
    }

    .type-badge.open {
      background: rgba(143, 181, 160, 0.15);
      color: var(--accent2);
    }

    .vraag-tekst { color: var(--text); margin-bottom: 0.35rem; }
    .vraag-antwoord { color: var(--muted); font-style: italic; font-size: 0.8rem; }

    .tijdlijn-item {
      display: flex;
      gap: 0.75rem;
      align-items: baseline;
      padding: 0.4rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }

    .tijdlijn-item:last-child { border-bottom: none; }

    .tijdlijn-jaar {
      color: var(--accent);
      font-weight: 500;
      min-width: 60px;
      flex-shrink: 0;
    }

    .debug-meta {
      margin-top: 1.5rem;
      padding: 1rem;
      background: var(--bg2);
      border-radius: 6px;
      font-size: 0.8rem;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    /* Raw JSON toggle */
    .json-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.5rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      margin-top: 1rem;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s;
    }

    .json-toggle:hover { border-color: var(--accent); color: var(--accent); }

    #raw-json {
      display: none;
      margin-top: 1rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      font-size: 0.75rem;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 400px;
      overflow-y: auto;
      font-family: monospace;
    }

    #raw-json.zichtbaar { display: block; }

    .fout {
      background: rgba(196, 106, 90, 0.1);
      border: 1px solid var(--error);
      color: var(--error);
      padding: 1rem 1.25rem;
      border-radius: 6px;
      font-size: 0.9rem;
      max-width: 500px;
      text-align: center;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">WikiLeer <span>dagelijks leren</span></div>
  <div class="datum" id="header-datum"></div>
</header>

<div id="homescreen">
  <div class="hero-tekst">
    <h1>Leer iets nieuws<br/>vandaag</h1>
    <p>Het uitgelichte artikel van de Nederlandse Wikipedia, omgezet naar een les met vragen en dagelijkse herhaling.</p>
  </div>

  <button class="knop-primair" id="knop-les" onclick="maakLes()">
    Maak les van vandaag
  </button>

  <div id="status-wrap">
    <div id="status-tekst">Bezig...</div>
    <div class="laadbalk-bg">
      <div class="laadbalk-voortgang" id="laadbalk"></div>
    </div>
  </div>

  <div id="fout-wrap"></div>
</div>

<!-- Stap 2: debug weergave van de Gemini JSON output -->
<div id="debug-wrap">
  <div class="debug-label">✅ Gemini output — stap 2 controle</div>
  <div class="debug-titel" id="debug-titel"></div>
  <div id="debug-secties"></div>
  <div class="debug-meta" id="debug-meta"></div>
  <button class="json-toggle" onclick="toggleJson()">Bekijk ruwe JSON</button>
  <div id="raw-json"></div>
</div>

<script>
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // 🔑 VULL HIER JOUW GEMINI API KEY IN
  const GEMINI_API_KEY = "AIzaSyAsy6ELGkp1lalfZUBzePPawL9wzcAst-I";
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;
  const MAX_TEKST_LENGTE = 12000; // Gemini heeft genoeg context, maar te lange teksten vertragen

  // ── Datum in header ──
  const nu = new Date();
  document.getElementById('header-datum').textContent =
    nu.toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  // ── Status helpers ──
  function setStatus(tekst, voortgang) {
    document.getElementById('status-wrap').classList.add('zichtbaar');
    document.getElementById('status-tekst').textContent = tekst;
    document.getElementById('laadbalk').style.width = voortgang + '%';
  }

  function verbergStatus() {
    document.getElementById('status-wrap').classList.remove('zichtbaar');
  }

  function toonFout(bericht) {
    document.getElementById('fout-wrap').innerHTML =
      `<div class="fout">⚠️ ${bericht}</div>`;
  }

  function toggleJson() {
    document.getElementById('raw-json').classList.toggle('zichtbaar');
  }

  // ── Wikipedia: haal naam uitgelicht artikel op ──
  async function haalUitgelichtArtikel() {
    const url = 'https://nl.wikipedia.org/w/api.php?action=parse&page=Hoofdpagina&prop=text&format=json&origin=*';
    const res = await fetch(url);
    if (!res.ok) throw new Error('Kon Wikipedia hoofdpagina niet ophalen');
    const data = await res.json();

    const parser = new DOMParser();
    const doc = parser.parseFromString(data.parse.text['*'], 'text/html');

    let artikelTitel = null;

    const uitgelichtDiv = doc.querySelector('#mp-uitgelicht');
    if (uitgelichtDiv) {
      const eersteLink = uitgelichtDiv.querySelector('a[href^="/wiki/"]:not([href*=":"])');
      if (eersteLink) {
        artikelTitel = decodeURIComponent(eersteLink.getAttribute('href').replace('/wiki/', '').replace(/_/g, ' '));
      }
    }

    if (!artikelTitel) {
      const alleLinks = doc.querySelectorAll('a[href^="/wiki/"]:not([href*=":"])');
      for (const link of alleLinks) {
        const titel = decodeURIComponent(link.getAttribute('href').replace('/wiki/', '').replace(/_/g, ' '));
        if (titel && titel !== 'Hoofdpagina' && link.textContent.length > 3) {
          artikelTitel = titel;
          break;
        }
      }
    }

    if (!artikelTitel) throw new Error('Kon het uitgelichte artikel niet vinden op de hoofdpagina');
    return artikelTitel;
  }

  // ── Wikipedia: haal volledige tekst op ──
  async function haalVolledigeTekst(titel) {
    const url = `https://nl.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(titel)}&prop=extracts&explaintext=true&format=json&origin=*`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Kon het artikel niet ophalen');
    const data = await res.json();

    const pages = data.query.pages;
    const page = Object.values(pages)[0];
    if (!page || page.missing) throw new Error(`Artikel "${titel}" niet gevonden`);

    return {
      titel: page.title,
      tekst: page.extract
    };
  }

  // ── Gemini: verwerk Wikipedia tekst naar les ──
  async function verwerkMetGemini(titel, tekst) {
    // Tekst inkorten als die te lang is
    const ingekorte = tekst.length > MAX_TEKST_LENGTE
      ? tekst.slice(0, MAX_TEKST_LENGTE) + '\n\n[tekst ingekort vanwege lengte]'
      : tekst;

    const prompt = `Je bent een professionele schrijver en leraar die Wikipedia-artikelen omzet naar heldere, boeiende lessen.

Je krijgt het Wikipedia-artikel: "${titel}"

JOUW TAAK:
1. Verwerk dit artikel tot een hapbare les in goed, helder Nederlands
2. Bepaal zelf hoeveel secties nodig zijn (minimaal 3, maximaal 6) op basis van lengte en complexiteit
3. Als het artikel uitgebreid linkt naar andere belangrijke concepten, mag dat concept een eigen sectie krijgen
4. Schrijf elke sectietekst alsof je een enthousiaste maar heldere journalist bent — geen droge opsommingen
5. Voeg een tijdlijn toe ALS het artikel duidelijke historische gebeurtenissen bevat (anders weglaat je het tijdlijn-veld)
6. Maak per sectie 2-3 vragen: een mix van meerkeuze en open vragen

VRAGENREGELS:
- Meerkeuze: altijd 4 opties, precies 1 goed antwoord
- Open vragen: verwacht antwoord is kort (1-5 woorden), niet hoofdlettergevoelig
- Vragen toetsen begrip, niet trivia

GEEF JE ANTWOORD UITSLUITEND ALS GELDIGE JSON — geen uitleg, geen markdown, geen backticks.

JSON STRUCTUUR:
{
  "secties": [
    {
      "titel": "Titel van de sectie",
      "tekst": "De herschreven, leesbare tekst van deze sectie. Minimaal 3 alinea's.",
      "tijdlijn": [
        {"jaar": "1850", "gebeurtenis": "Wat er gebeurde"}
      ],
      "vragen": [
        {
          "type": "meerkeuze",
          "vraag": "De vraag?",
          "opties": ["Optie A", "Optie B", "Optie C", "Optie D"],
          "goed": "Optie A"
        },
        {
          "type": "open",
          "vraag": "De vraag?",
          "antwoord": "kort antwoord"
        }
      ]
    }
  ]
}

ARTIKEL TEKST:
${ingekorte}`;

    const res = await fetch(GEMINI_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: {
          temperature: 0.7,
          maxOutputTokens: 8192,
        }
      })
    });

    if (!res.ok) {
      const fout = await res.json().catch(() => ({}));
      const bericht = fout?.error?.message || `Gemini API fout (${res.status})`;
      throw new Error(bericht);
    }

    const data = await res.json();
    const ruweText = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!ruweText) throw new Error('Gemini gaf geen bruikbaar antwoord terug');

    // JSON parsen — verwijder eventuele markdown backticks
    const schoon = ruweText
      .replace(/```json\s*/gi, '')
      .replace(/```\s*/g, '')
      .trim();

    try {
      return JSON.parse(schoon);
    } catch (e) {
      console.error('Ruwe Gemini output:', ruweText);
      throw new Error('Gemini gaf geen geldige JSON terug. Zie console voor details.');
    }
  }

  // ── Debug weergave van de Gemini output ──
  function toonDebugOutput(titel, lesData) {
    document.getElementById('debug-titel').textContent = titel;

    const sectiesEl = document.getElementById('debug-secties');
    sectiesEl.innerHTML = '';

    lesData.secties.forEach((sectie, i) => {
      const card = document.createElement('div');
      card.className = 'sectie-card';

      // Tijdlijn HTML
      let tijdlijnHtml = '';
      if (sectie.tijdlijn && sectie.tijdlijn.length > 0) {
        tijdlijnHtml = `<div style="margin-bottom:0.75rem;">
          <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent2);margin-bottom:0.5rem;">Tijdlijn</div>
          ${sectie.tijdlijn.map(t => `
            <div class="tijdlijn-item">
              <span class="tijdlijn-jaar">${t.jaar}</span>
              <span>${t.gebeurtenis}</span>
            </div>`).join('')}
        </div>`;
      }

      // Vragen HTML
      const vragenHtml = (sectie.vragen || []).map(v => `
        <div class="vraag-item">
          <span class="type-badge ${v.type}">${v.type}</span>
          <div class="vraag-tekst">${v.vraag}</div>
          ${v.type === 'meerkeuze'
            ? `<div class="vraag-antwoord">✓ ${v.goed} &nbsp;|&nbsp; opties: ${v.opties.join(' / ')}</div>`
            : `<div class="vraag-antwoord">✓ "${v.antwoord}"</div>`
          }
        </div>`).join('');

      card.innerHTML = `
        <h3>Sectie ${i + 1}: ${sectie.titel}</h3>
        <p>${sectie.tekst.slice(0, 200)}${sectie.tekst.length > 200 ? '…' : ''}</p>
        ${tijdlijnHtml}
        <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:0.5rem;">Vragen (${sectie.vragen?.length || 0})</div>
        ${vragenHtml}
      `;

      sectiesEl.appendChild(card);
    });

    // Meta info
    const totalVragen = lesData.secties.reduce((som, s) => som + (s.vragen?.length || 0), 0);
    document.getElementById('debug-meta').textContent =
      `✅ ${lesData.secties.length} secties | ${totalVragen} vragen gegenereerd | Klaar voor stap 3 (Les UI)`;

    // Raw JSON
    document.getElementById('raw-json').textContent = JSON.stringify(lesData, null, 2);

    // Toon debug scherm
    document.getElementById('homescreen').style.display = 'none';
    document.getElementById('debug-wrap').classList.add('zichtbaar');
  }

  // ── Hoofdfunctie ──
  async function maakLes() {
    if (GEMINI_API_KEY === 'JOUW_API_KEY_HIER') {
      toonFout('Vul eerst je Gemini API key in bovenaan de code (GEMINI_API_KEY)');
      return;
    }

    const knop = document.getElementById('knop-les');
    knop.disabled = true;
    document.getElementById('fout-wrap').innerHTML = '';

    try {
      setStatus('Wikipedia hoofdpagina ophalen...', 10);
      const artikelNaam = await haalUitgelichtArtikel();

      setStatus(`Artikel ophalen: "${artikelNaam}"...`, 30);
      const { titel, tekst } = await haalVolledigeTekst(artikelNaam);

      setStatus('Gemini verwerkt het artikel...', 55);
      const lesData = await verwerkMetGemini(titel, tekst);

      setStatus('Les klaar!', 100);

      setTimeout(() => {
        verbergStatus();
        toonDebugOutput(titel, lesData);
      }, 400);

    } catch (err) {
      verbergStatus();
      toonFout(err.message);
      knop.disabled = false;
    }
  }
</script>

</body>
</html>
