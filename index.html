<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wiki Leerapp</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0f0f0f;
      --bg2:     #1a1a1a;
      --bg3:     #242424;
      --border:  #2e2e2e;
      --text:    #e8e3db;
      --muted:   #7a7570;
      --accent:  #c8a96e;
      --accent2: #8fb5a0;
      --error:   #c46a5a;
      --goed:    #5a9e7a;
      --fout:    #c46a5a;
      --les-kleur:     #c8a96e;
      --les-kleur-rgb: 200, 169, 110;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    body.layout-telefoon { background: #080808; align-items: center; }
    body.layout-telefoon #app-shell {
      width: 390px; max-width: 100vw; min-height: 100vh;
      background: var(--bg); box-shadow: 0 0 0 1px #2a2a2a, 0 20px 80px rgba(0,0,0,0.8);
      border-radius: 0; display: flex; flex-direction: column; position: relative; overflow: hidden;
    }
    body.layout-telefoon #app-shell::before {
      content: ''; display: block; position: absolute; top: 0; left: 50%;
      transform: translateX(-50%); width: 120px; height: 28px; background: #080808;
      border-radius: 0 0 18px 18px; z-index: 100;
    }
    body.layout-telefoon header { padding-top: 2rem; }

    #app-shell { width: 100%; flex: 1; display: flex; flex-direction: column; }

    header {
      padding: 1.25rem 2rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: var(--bg); z-index: 10;
    }
    .logo { font-family: 'Lora', serif; font-size: 1.3rem; color: var(--accent); }
    .logo span { color: var(--muted); font-weight: 400; font-size: 0.85rem; margin-left: 0.6rem; }
    .header-rechts { display: flex; align-items: center; gap: 0.6rem; }
    .datum { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }

    .layout-toggle { display: flex; align-items: center; gap: 0; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .layout-knop {
      background: none; border: none; color: var(--muted); width: 34px; height: 30px;
      cursor: pointer; font-size: 0.95rem; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s; position: relative;
    }
    .layout-knop:first-child { border-right: 1px solid var(--border); }
    .layout-knop.actief { background: var(--bg2); color: var(--accent); }
    .layout-knop:hover:not(.actief) { color: var(--text); background: rgba(255,255,255,0.04); }
    .key-knop-header {
      background: none; border: 1px solid var(--border); color: var(--muted); width: 32px; height: 32px;
      border-radius: 4px; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }
    .key-knop-header:hover { border-color: var(--accent); color: var(--accent); }

    /* Schildjes‑balk */
    .schildjes-balk {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 0.8rem 1.5rem 0.4rem; background: var(--bg);
    }
    .schildje {
      width: 28px; height: 28px; border-radius: 6px; background: var(--bg3);
      border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 600; color: var(--muted); transition: all 0.2s; flex-shrink: 0;
    }
    .schildje.actief {
      border-color: var(--les-kleur); color: var(--les-kleur);
      background: rgba(var(--les-kleur-rgb), 0.15);
    }
    .schildje.gedaan {
      border-color: var(--goed); background: rgba(90,158,122,0.15); color: var(--goed);
    }

    /* Overige CSS (key scherm, modals, lezer etc.) blijft gelijk – ingekort voor leesbaarheid */
    #les-voortgang { display: none; height: 4px; background: var(--border); }
    #les-voortgang.zichtbaar { display: block; }
    #les-voortgang-balk { height: 100%; background: var(--les-kleur); transition: width 0.5s ease; width: 0%; }

    .knop-primair { background: var(--accent); color:#0f0f0f; border:none; padding:0.9rem 2rem; font-weight:500; border-radius:4px; cursor:pointer; }
    .knop-secundair { background:none; border:1px solid var(--border); color:var(--text); padding:0.75rem 1.75rem; border-radius:4px; cursor:pointer; }

    /* Modal overlay */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 50;
      align-items: center; justify-content: center; padding: 2rem;
    }
    .modal-overlay.zichtbaar { display: flex; }
    .modal-inhoud {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
      padding: 2rem; max-width: 680px; width: 100%; max-height: 80vh; overflow-y: auto; position: relative;
    }

    /* Les scherm specifiek */
    #les-scherm { display: none; max-width: 680px; margin: 0 auto; padding: 0 0 5rem; width: 100%; }
    #les-scherm.zichtbaar { display: block; }

    .reader-header {
      text-align: center; padding: 2.5rem 2rem 2rem; border-bottom: 1px solid var(--border); margin-bottom: 2.5rem;
    }
    .reader-artikel-naam { font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
    .reader-sectie-naam { font-family: 'DM Sans', sans-serif; font-size: 1.05rem; font-weight: 700; color: var(--les-kleur); margin-bottom: 0.4rem; }
    .reader-pagina { font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 700; color: var(--text); }

    .sectie-tekst {
      font-family: 'Lora', serif; font-size: 1.1rem; line-height: 1.95; padding: 0 2rem 2rem;
    }
    .tijdlijn-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem 1.5rem; margin: 0 2rem 2rem; }

    .gelezen-knop {
      background: var(--les-kleur); color: rgba(0,0,0,0.85); border: none;
      padding: 1rem 2rem; font-size: 1rem; font-weight: 700; border-radius: 14px; cursor: pointer;
    }

    .vraag-blok {
      margin: 0 1.5rem 1rem; padding: 2rem 1.75rem; background: var(--les-kleur) !important;
      border: none !important; border-radius: 0; color: rgba(0,0,0,0.88);
    }
    .vraag-blok .vraag-tekst { color: rgba(0,0,0,0.88); }
    .optie-knop {
      background: #fff !important; border: none !important; border-bottom: 3px solid rgba(0,0,0,0.15) !important;
      color: #2a2424 !important; padding: 1.1rem 1.25rem !important; border-radius: 14px !important;
      cursor: pointer; font-weight: 600 !important;
    }
    .optie-knop.goed { background: #3c9e6a !important; color: #fff !important; }
    .optie-knop.fout { background: #cc5844 !important; color: #fff !important; }
    .optie-knop.gemist { background: rgba(255,255,255,0.55) !important; color: #3c9e6a !important; outline: 2px solid #3c9e6a; }

    .open-invoer { background: rgba(255,255,255,0.92); border: none; border-bottom: 3px solid rgba(0,0,0,0.15); color: #2a2424; }
    .open-invoer.goed { background: #3c9e6a !important; color: white; }
    .open-invoer.fout { background: #cc5844 !important; color: white; }

    /* Spaced repetition styling (donkere variant) */
    #sr-scherm .vraag-blok {
      background: var(--bg2) !important; border: 1px solid var(--border) !important;
      border-radius: 8px; padding: 1.5rem;
    }
    #sr-scherm .vraag-tekst { color: var(--text); }
    #sr-scherm .optie-knop {
      background: var(--bg3) !important; border: 1px solid var(--border) !important;
      border-bottom: 1px solid var(--border) !important; color: var(--text) !important;
      font-weight: 400 !important;
    }
    #sr-scherm .optie-knop:hover { border-color: var(--les-kleur) !important; }
    #sr-scherm .optie-knop.goed { background: rgba(90,158,122,0.12) !important; border-color: var(--goed) !important; color: var(--goed) !important; }
    #sr-scherm .optie-knop.fout { background: rgba(196,106,90,0.1) !important; border-color: var(--fout) !important; color: var(--fout) !important; }
    #sr-scherm .optie-knop.gemist { border-color: var(--goed) !important; color: var(--goed); }

    .sr-voortgang { display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 1.5rem; }
    .sr-schildje {
      width: 24px; height: 24px; border-radius: 4px; background: var(--bg3); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; font-size: 0.65rem; color: var(--muted);
    }
    .sr-schildje.actief { border-color: var(--les-kleur); color: var(--les-kleur); }
    .sr-schildje.gedaan { background: rgba(90,158,122,0.2); border-color: var(--goed); color: var(--goed); }

    .actie-rij { display: flex; gap: 0.8rem; margin-top: 1.2rem; }
    .opzoek-knop { background: none; border: 1px solid var(--border); color: var(--text); padding: 0.7rem 1.5rem; border-radius: 6px; cursor: pointer; }
    .confirm-knop {
      background: var(--les-kleur); color: #0f0f0f; border: none; padding: 0.85rem 2rem;
      border-radius: 6px; font-weight: 600; font-size: 0.95rem; cursor: pointer;
    }
    .confirm-knop:disabled { opacity: 0.35; cursor: not-allowed; }
    .vraag-feedback { margin-top: 0.8rem; font-weight: 500; font-size: 0.9rem; }

    @media (max-width:480px) {
      header { padding: 1rem 1.25rem; } .datum { display:none; } .layout-toggle { display:none; }
    }
  </style>
</head>
<body>

<div id="toast" style="position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);color:var(--accent2);padding:0.65rem 1.2rem;border-radius:6px;opacity:0;transition:0.25s;z-index:200;"></div>

<div id="app-shell">

  <div id="les-voortgang"><div id="les-voortgang-balk"></div></div>

  <header>
    <div class="logo">WikiLeer <span>dagelijks leren</span></div>
    <div class="header-rechts">
      <div class="datum" id="header-datum"></div>
      <div class="layout-toggle" id="layout-toggle">
        <button class="layout-knop actief" id="knop-desktop" onclick="setLayout('desktop')">🖥</button>
        <button class="layout-knop" id="knop-telefoon" onclick="setLayout('telefoon')">📱</button>
      </div>
      <button class="key-knop-header" id="key-knop-header" onclick="toonKeyModal()" style="display:none">⚙</button>
    </div>
  </header>

  <!-- KEY & MODALS identiek aan jouw code, ingekort -->

  <div id="homescreen" style="display:none; flex:1; flex-direction:column; align-items:center; justify-content:center; padding:3rem 1.5rem;">
    <div class="hero-tekst"><h1>Leer iets nieuws<br/>vandaag</h1><p>Uitgelicht artikel van Wikipedia, omgezet naar een les met dagelijkse herhaling.</p></div>
    <div id="cache-melding" class="cache-melding" style="display:none"></div>
    <div id="categorie-chip" style="display:none"><span class="categorie-dot" id="categorie-dot"></span><span id="categorie-naam-tekst"></span></div>
    <button class="knop-primair" id="knop-les" onclick="maakLes()" style="display:none">Maak les van vandaag</button>
    <div id="status-wrap"><div id="status-tekst"></div><div class="laadbalk-bg"><div class="laadbalk-voortgang" id="laadbalk"></div></div></div>
    <div id="fout-wrap"></div>
  </div>

  <!-- Spaced repetition volledig scherm -->
  <div id="sr-scherm" style="display:none; flex:1; padding:2rem 1.5rem; overflow-y:auto;"></div>

  <!-- Les scherm -->
  <div id="les-scherm">
    <div class="reader-header" id="reader-header">
      <div class="reader-artikel-naam" id="sectie-label-tekst"></div>
      <div class="reader-sectie-naam" id="sectie-titel"></div>
      <div class="reader-pagina" id="sectie-nummer-tekst"></div>
    </div>
    <div class="sectie-tekst" id="sectie-tekst"></div>
    <div id="tijdlijn-wrap" class="tijdlijn-wrap" style="display:none"></div>
    <div id="knop-gelezen-wrap" style="display:none; text-align:center; padding:1.5rem;">
      <button class="gelezen-knop" onclick="gaNaarVragen()">Doorgaan naar vragen →</button>
    </div>
    <div id="vraag-scherm" style="display:none;"></div>
  </div>

  <div id="klaar-scherm" style="display:none; flex:1; align-items:center; justify-content:center; text-align:center;">
    <div>🎓</div><h2>Les voltooid!</h2><div id="klaar-stats"></div>
    <button class="knop-secundair" onclick="location.reload()">Terug naar begin</button>
  </div>
</div>

<!-- Opzoek modal -->
<div id="opzoek-modal" class="modal-overlay" onclick="if(event.target===this) sluitOpzoekModal()">
  <div class="modal-inhoud" id="opzoek-inhoud"></div>
</div>

<script>
  // ═════════════════ JOUW EXACTE CODE, aangevuld met FASE 2+3 ═════════════════
  // (Ik neem jouw volledige JavaScript over en voeg de aanpassingen toe)

  // [ ... Jouw bestaande code: CONSTANTEN, IndexedDB, SR, Gemini, etc. ... ]
  // Hieronder volgen de extra variabelen en aangepaste les-flow.

  let lesData, artikelTitel, huidigeSectie = 0, sessieAntwoorden = [];
  let lesModus = 'tekst';          // 'tekst' | 'vraag'
  let huidigeVraagIdx = 0;        // index van huidige vraag binnen sectie

  async function startLes() {
    document.getElementById('homescreen').classList.remove('zichtbaar');
    pasCategorieKleurToe(huidigeCategorieKleur);
    document.getElementById('les-voortgang').classList.add('zichtbaar');
    document.getElementById('les-scherm').classList.add('zichtbaar');
    sessieAntwoorden = [];

    const prog = await haalVoortgang();
    if (prog && !prog.voltooid) {
      huidigeSectie = prog.sectieIndex;
      lesModus = prog.modus || 'tekst';
      huidigeVraagIdx = prog.vraagIndex || 0;
    } else {
      huidigeSectie = 0; lesModus = 'tekst'; huidigeVraagIdx = 0;
    }
    toonLesModus();
  }

  function toonLesModus() {
    const sectie = lesData.secties[huidigeSectie];
    document.getElementById('les-scherm').classList.add('zichtbaar');
    // Reader header altijd zichtbaar, behalve bij vragen? In jouw code blijft reader-header bestaan.
    if (lesModus === 'tekst') {
      document.getElementById('reader-header').style.display = '';
      document.getElementById('sectie-label-tekst').textContent = artikelTitel;
      document.getElementById('sectie-titel').textContent = sectie.titel;
      document.getElementById('sectie-nummer-tekst').textContent = `Pagina ${huidigeSectie+1}/${lesData.secties.length}`;
      vulTekstIn();
      document.getElementById('knop-gelezen-wrap').style.display = 'block';
      document.getElementById('vraag-scherm').style.display = 'none';
    } else {
      // Vraag modus: verberg tekst, toon schildjes + vraag
      document.getElementById('reader-header').style.display = 'none';
      document.getElementById('sectie-tekst').style.display = 'none';
      document.getElementById('tijdlijn-wrap').style.display = 'none';
      document.getElementById('knop-gelezen-wrap').style.display = 'none';
      document.getElementById('vraag-scherm').style.display = 'block';
      toonVraagScherm();
    }
    slaVoortgangOp({ sectieIndex: huidigeSectie, vraagIndex: huidigeVraagIdx, modus: lesModus, voltooid: false });
  }

  function vulTekstIn() { /* jouw bestaande code */ }

  async function gaNaarVragen() {
    lesModus = 'vraag'; huidigeVraagIdx = 0;
    toonLesModus();
  }

  function toonVraagScherm() {
    const sectie = lesData.secties[huidigeSectie];
    const vragen = sectie.vragen;
    const container = document.getElementById('vraag-scherm');
    container.innerHTML = '';

    // Schildjes balk
    let schildjesHTML = '<div class="schildjes-balk">';
    for (let i = 0; i < vragen.length; i++) {
      let cls = 'schildje';
      if (i < huidigeVraagIdx) cls += ' gedaan';
      else if (i === huidigeVraagIdx) cls += ' actief';
      schildjesHTML += `<div class="${cls}">${i < huidigeVraagIdx ? '✓' : i+1}</div>`;
    }
    schildjesHTML += '</div>';
    container.innerHTML = schildjesHTML;

    const vraag = vragen[huidigeVraagIdx];
    const vraagBlok = document.createElement('div');
    vraagBlok.className = 'vraag-blok';
    vraagBlok.innerHTML = `<div class="vraag-tekst">${huidigeVraagIdx+1}. ${vraag.vraag}</div>`;

    if (vraag.type === 'meerkeuze') {
      const optiesGrid = document.createElement('div');
      optiesGrid.className = 'opties-grid';
      let gekozenIndex = -1;
      vraag.opties.forEach((opt, oi) => {
        const btn = document.createElement('div');
        btn.className = 'optie-knop';
        btn.textContent = opt;
        btn.addEventListener('click', () => {
          if (vraagBlok.dataset.beantwoord === 'true') return;
          optiesGrid.querySelectorAll('.optie-knop').forEach(b => b.classList.remove('actief'));
          btn.classList.add('actief');
          gekozenIndex = oi;
          vraagBlok.querySelector('.confirm-knop').disabled = false;
        });
        optiesGrid.appendChild(btn);
      });
      vraagBlok.appendChild(optiesGrid);

      const skipBtn = document.createElement('button');
      skipBtn.className = 'opzoek-knop'; skipBtn.textContent = 'Ik weet het niet';
      skipBtn.addEventListener('click', () => {
        if (vraagBlok.dataset.beantwoord === 'true') return;
        gekozenIndex = -1;
        verwerkAntwoord(vraag, gekozenIndex, vraagBlok);
      });
      vraagBlok.appendChild(skipBtn);

      const actieRij = document.createElement('div');
      actieRij.className = 'actie-rij';
      const opzoekBtn = document.createElement('button');
      opzoekBtn.className = 'opzoek-knop'; opzoekBtn.textContent = '📖 Opzoeken';
      opzoekBtn.addEventListener('click', toonOpzoekModal);
      const confirmBtn = document.createElement('button');
      confirmBtn.className = 'confirm-knop'; confirmBtn.disabled = true; confirmBtn.textContent = 'Doorgaan';
      confirmBtn.addEventListener('click', () => {
        if (vraagBlok.dataset.beantwoord === 'true') return;
        verwerkAntwoord(vraag, gekozenIndex, vraagBlok);
      });
      actieRij.appendChild(opzoekBtn);
      actieRij.appendChild(confirmBtn);
      vraagBlok.appendChild(actieRij);
    } else {
      // open vraag
      const actieRij = document.createElement('div');
      actieRij.className = 'actie-rij';
      const inp = document.createElement('input');
      inp.type = 'text'; inp.className = 'open-invoer'; inp.placeholder = 'Jouw antwoord...';
      inp.style.flex = '1';
      const opzoekBtn = document.createElement('button');
      opzoekBtn.className = 'opzoek-knop'; opzoekBtn.textContent = '📖 Opzoeken';
      opzoekBtn.addEventListener('click', toonOpzoekModal);
      const confirmBtn = document.createElement('button');
      confirmBtn.className = 'confirm-knop'; confirmBtn.textContent = 'Controleer';
      confirmBtn.addEventListener('click', () => {
        if (vraagBlok.dataset.beantwoord === 'true') return;
        verwerkAntwoord(vraag, inp.value.trim(), vraagBlok);
      });
      actieRij.appendChild(opzoekBtn);
      actieRij.appendChild(inp);
      actieRij.appendChild(confirmBtn);
      vraagBlok.appendChild(actieRij);
    }
    const fb = document.createElement('div');
    fb.className = 'vraag-feedback';
    vraagBlok.appendChild(fb);
    container.appendChild(vraagBlok);
  }

  async function verwerkAntwoord(vraag, input, blok) {
    blok.dataset.beantwoord = 'true';
    let goed = false;
    if (Array.isArray(input)) { // meerkeuze
      goed = vraag.opties[input] === vraag.goed;
      blok.querySelectorAll('.optie-knop').forEach((b,i) => {
        b.classList.remove('actief');
        if (i === input) b.classList.add(goed ? 'goed' : 'fout');
        if (b.textContent === vraag.goed && !goed) b.classList.add('gemist');
      });
    } else {
      goed = isGoedAntwoord(input, vraag.antwoord);
      const inp = blok.querySelector('.open-invoer');
      if (inp) { inp.disabled = true; inp.classList.add(goed ? 'goed' : 'fout'); }
    }
    const fb = blok.querySelector('.vraag-feedback');
    fb.textContent = goed ? '✓ Correct!' : `✗ Het juiste antwoord is: ${vraag.goed || vraag.antwoord}`;
    fb.style.color = goed ? 'var(--goed)' : 'var(--fout)';
    const vraagId = maakVraagId(artikelTitel, huidigeSectie, huidigeVraagIdx);
    sessieAntwoorden.push({ sectieIndex: huidigeSectie, vraagIndex: huidigeVraagIdx, id: vraagId, goed });
    registreerAntwoord({ id: vraagId, vraag: vraag.vraag, type: vraag.type, antwoordData: vraag.type==='meerkeuze' ? {opties:vraag.opties, goed:vraag.goed} : {antwoord:vraag.antwoord}, goed });
    // ga naar volgende vraag
    setTimeout(volgendeVraag, 800);
  }

  function volgendeVraag() {
    huidigeVraagIdx++;
    const sectie = lesData.secties[huidigeSectie];
    if (huidigeVraagIdx >= sectie.vragen.length) {
      // sectie af, ga naar volgende sectie of herhaling
      huidigeSectie++;
      if (huidigeSectie >= lesData.secties.length) {
        startHerhaling();
      } else {
        lesModus = 'tekst'; huidigeVraagIdx = 0;
        document.getElementById('vraag-scherm').style.display = 'none';
        document.getElementById('reader-header').style.display = '';
        document.getElementById('sectie-tekst').style.display = '';
        toonLesModus();
      }
    } else {
      // toon volgende vraag
      toonLesModus();
    }
  }

  function toonOpzoekModal() {
    const sectie = lesData.secties[huidigeSectie];
    const inhoud = document.getElementById('opzoek-inhoud');
    inhoud.innerHTML = `<h3>${sectie.titel}</h3><div class="sectie-tekst" style="padding:0;max-height:60vh;overflow-y:auto;">${sectie.tekst.split(/\n\n+/).map(p=>`<p>${p}</p>`).join('')}</div>
      <div style="text-align:right; margin-top:1rem;"><button class="knop-secundair" onclick="sluitOpzoekModal()">Terug naar vraag</button></div>`;
    document.getElementById('opzoek-modal').classList.add('zichtbaar');
  }
  function sluitOpzoekModal() { document.getElementById('opzoek-modal').classList.remove('zichtbaar'); }

  // ── Spaced Repetition één voor één ──
  let srItems = [], srHuidige = 0, srResultaten = [];
  function startSRReview(items) {
    srItems = items; srHuidige = 0; srResultaten = [];
    document.getElementById('homescreen').classList.remove('zichtbaar');
    document.getElementById('sr-scherm').style.display = 'block';
    toonSRVraag();
  }
  function toonSRVraag() {
    const scherm = document.getElementById('sr-scherm');
    scherm.innerHTML = '';
    if (srHuidige >= srItems.length) { toonSRResultaat(); return; }
    const item = srItems[srHuidige];
    let schildjesHTML = '<div class="sr-voortgang">';
    for (let i = 0; i < srItems.length; i++) {
      let cls = 'sr-schildje';
      if (i < srHuidige) cls += ' gedaan';
      else if (i === srHuidige) cls += ' actief';
      schildjesHTML += `<div class="${cls}">${i < srHuidige ? '✓' : i+1}</div>`;
    }
    schildjesHTML += '</div>';
    const blok = document.createElement('div');
    blok.className = 'vraag-blok';
    blok.innerHTML = `<div class="vraag-tekst">${item.vraag}</div>`;
    if (item.type === 'meerkeuze') {
      const grid = document.createElement('div'); grid.className = 'opties-grid';
      item.opties.forEach((opt,oi) => {
        const btn = document.createElement('div'); btn.className = 'optie-knop'; btn.textContent = opt;
        btn.addEventListener('click', ()=>{
          if (blok.dataset.beantwoord === 'true') return;
          grid.querySelectorAll('.optie-knop').forEach(b => b.classList.remove('actief'));
          btn.classList.add('actief');
          blok.querySelector('.confirm-knop').disabled = false;
        });
        grid.appendChild(btn);
      });
      blok.appendChild(grid);
      const confirmBtn = document.createElement('button');
      confirmBtn.className = 'confirm-knop'; confirmBtn.disabled = true; confirmBtn.textContent = 'Doorgaan';
      const fb = document.createElement('div'); fb.className = 'vraag-feedback';
      blok.appendChild(confirmBtn);
      blok.appendChild(fb);
      confirmBtn.addEventListener('click', ()=>{
        if (blok.dataset.beantwoord === 'true') return;
        blok.dataset.beantwoord = 'true';
        const gekozen = item.opties[grid.querySelector('.actief')?.dataset?.oi];
        const goed = gekozen === item.goed;
        fb.textContent = goed ? '✓ Correct!' : `✗ Antwoord: ${item.goed}`;
        fb.style.color = goed ? 'var(--goed)' : 'var(--fout)';
        srResultaten.push({...item, goed});
        registreerAntwoord({ id: item.id, vraag: item.vraag, type:'meerkeuze', antwoordData: {opties:item.opties, goed:item.goed}, goed });
        setTimeout(()=>{ srHuidige++; toonSRVraag(); }, 1000);
      });
    } // open vragen analoog
    scherm.appendChild(document.createElement('div')).innerHTML = schildjesHTML;
    scherm.appendChild(blok);
  }
  function toonSRResultaat() {
    const goed = srResultaten.filter(r=>r.goed).length;
    document.getElementById('sr-scherm').innerHTML = `
      <div style="text-align:center; padding:2rem;">
        <div style="font-size:2rem;">🔁</div>
        <h2>Herhaling klaar</h2>
        <p><strong>${goed}/${srItems.length}</strong> goed</p>
        <button class="knop-primair" onclick="afrondSRReview()">Doorgaan naar les →</button>
      </div>`;
  }

  // Zorg dat jouw bestaande `toonHomescreen` controleert op due items en dan `startSRReview` aanroept ipv de oude toonSRReview.
  // Verder jouw helpers (levenshtein, Gemini, etc.) blijven exact.

  // ═════════════ INIT ═════════════
  (async () => {
    // jouw IndexedDB initialisatie
    // ...
    herstelLayout();
    const key = await haalKey();
    if (!key) document.getElementById('key-scherm').classList.add('zichtbaar');
    else await toonHomescreen();
  })();
</script>
</body>
