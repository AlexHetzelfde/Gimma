<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wiki Leerapp</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0f0f0f;
      --bg2:     #1a1a1a;
      --bg3:     #242424;
      --border:  #2e2e2e;
      --text:    #e8e3db;
      --muted:   #7a7570;
      --accent:  #c8a96e;
      --accent2: #8fb5a0;
      --error:   #c46a5a;
      --goed:    #5a9e7a;
      --fout:    #c46a5a;
      --les-kleur:     #c8a96e;
      --les-kleur-rgb: 200, 169, 110;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.3s;
    }

    body.layout-telefoon {
      background: #080808;
      align-items: center;
    }

    body.layout-telefoon #app-shell {
      width: 390px;
      max-width: 100vw;
      min-height: 100vh;
      background: var(--bg);
      box-shadow: 0 0 0 1px #2a2a2a, 0 20px 80px rgba(0,0,0,0.8);
      border-radius: 0;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    body.layout-telefoon #app-shell::before {
      content: '';
      display: block;
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 28px;
      background: #080808;
      border-radius: 0 0 18px 18px;
      z-index: 100;
    }

    body.layout-telefoon header { padding-top: 2rem; }

    #app-shell {
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .logo {
      font-family: 'Lora', serif;
      font-size: 1.3rem;
      color: var(--accent);
    }

    .logo span {
      color: var(--muted);
      font-weight: 400;
      font-size: 0.85rem;
      margin-left: 0.6rem;
    }

    .header-rechts { display: flex; align-items: center; gap: 0.6rem; }

    .datum {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .layout-toggle {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .layout-knop {
      background: none;
      border: none;
      color: var(--muted);
      width: 34px;
      height: 30px;
      cursor: pointer;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      position: relative;
    }

    .layout-knop:first-child { border-right: 1px solid var(--border); }
    .layout-knop.actief { background: var(--bg2); color: var(--accent); }
    .layout-knop:hover:not(.actief) { color: var(--text); background: rgba(255,255,255,0.04); }

    .key-knop-header {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 32px;
      height: 32px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }
    .key-knop-header:hover { border-color: var(--accent); color: var(--accent); }

    #les-voortgang { display: none; height: 4px; background: var(--border); }
    #les-voortgang.zichtbaar { display: block; }
    #les-voortgang-balk { height: 100%; background: var(--les-kleur); transition: width 0.5s ease; width: 0%; }

    .schildjes-balk {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 0.8rem 1.5rem 0.4rem; background: var(--bg); position: sticky; top: 0; z-index: 5;
    }

    .schildje {
      width: 28px; height: 28px; border-radius: 6px; background: var(--bg3);
      border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 600; color: var(--muted); transition: all 0.2s; flex-shrink: 0;
    }

    .schildje.actief {
      border-color: var(--les-kleur); color: var(--les-kleur);
      background: rgba(var(--les-kleur-rgb), 0.15);
    }

    .schildje.gedaan {
      border-color: var(--goed); background: rgba(90,158,122,0.15); color: var(--goed);
    }

    /* KEY SCHERM */
    #key-scherm { display:none; flex:1; flex-direction:column; align-items:center; justify-content:center; padding:3rem 1.5rem; gap:2rem; }
    #key-scherm.zichtbaar { display:flex; }
    .key-kaart { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:2.5rem; max-width:480px; width:100%; }
    .key-kaart h2 { font-family:'Lora',serif; font-size:1.5rem; margin-bottom:0.6rem; }
    .key-kaart p { color:var(--muted); font-size:0.9rem; line-height:1.65; margin-bottom:1.5rem; }
    .key-kaart a { color:var(--accent); text-decoration:none; }
    .key-kaart a:hover { text-decoration:underline; }
    .key-invoer-wrap { display:flex; gap:0.6rem; flex-wrap:wrap; }
    .key-invoer { flex:1; min-width:200px; background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:0.8rem 1rem; border-radius:6px; font-family:monospace; font-size:0.95rem; outline:none; }
    .key-invoer:focus { border-color:var(--accent); }
    .key-fout { margin-top:0.75rem; font-size:0.85rem; color:var(--fout); min-height:1.2rem; }

    #key-modal {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:100;
      align-items:center; justify-content:center; padding:1.5rem;
    }
    #key-modal.zichtbaar { display:flex; }
    .modal-kaart { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:2rem; max-width:440px; width:100%; }
    .modal-kaart h3 { font-family:'Lora',serif; font-size:1.2rem; margin-bottom:0.5rem; }
    .modal-kaart p { color:var(--muted); font-size:0.85rem; margin-bottom:1.25rem; line-height:1.6; }
    .modal-acties { display:flex; gap:0.6rem; flex-wrap:wrap; margin-top:1rem; }

    /* HOMESCREEN */
    #homescreen { flex:1; display:none; flex-direction:column; align-items:center; justify-content:center; padding:3rem 1.5rem; gap:2rem; }
    #homescreen.zichtbaar { display:flex; }
    .hero-tekst { text-align:center; }
    .hero-tekst h1 { font-family:'Lora',serif; font-size:clamp(1.8rem,5vw,3rem); font-weight:600; line-height:1.2; margin-bottom:0.75rem; }
    .hero-tekst p { color:var(--muted); font-size:1rem; max-width:420px; margin:0 auto; }
    .cache-melding {
      background:rgba(143,181,160,0.08); border:1px solid rgba(143,181,160,0.25); color:var(--accent2);
      padding:0.75rem 1.25rem; border-radius:6px; font-size:0.88rem; text-align:center; max-width:400px;
    }
    .categorie-chip {
      display: inline-flex; align-items: center; gap: 0.45rem;
      font-size: 0.85rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--les-kleur); background: rgba(var(--les-kleur-rgb), 0.12);
      border: 1px solid var(--les-kleur); border-radius: 20px; padding: 0.35rem 1rem;
    }
    .categorie-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--les-kleur); flex-shrink: 0; }

    #status-wrap { display:none; flex-direction:column; align-items:center; gap:1rem; width:100%; max-width:480px; }
    #status-wrap.zichtbaar { display:flex; }
    #status-tekst { font-size:0.85rem; color:var(--muted); text-align:center; }
    .laadbalk-bg { width:100%; height:3px; background:var(--border); border-radius:2px; overflow:hidden; position:relative; }
    .laadbalk-voortgang { height:100%; background:var(--les-kleur); border-radius:2px; width:0%; transition:width 0.6s ease; }
    .laadbalk-shimmer { position:absolute; top:0; left:-100%; width:60%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent); animation:shimmer 1.4s infinite; }
    @keyframes shimmer { 0%{left:-60%;} 100%{left:110%;} }

    .knop-primair { background:var(--accent); color:#0f0f0f; border:none; padding:0.9rem 2rem; font-weight:500; border-radius:4px; cursor:pointer; }
    .knop-secundair { background:none; border:1px solid var(--border); color:var(--text); padding:0.75rem 1.75rem; border-radius:4px; cursor:pointer; }
